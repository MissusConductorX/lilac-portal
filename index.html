<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lilac Institute Terminal</title>
<style>
body {
    margin: 0;
    height: 100vh;
    background-color: #000; /* black like Apple II */
    color: #00FF00; /* classic green */
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
}
#terminalContainer {
    width: 90%;
    max-width: 800px;
    background-color: #000;
    padding: 20px;
    border: 2px solid #00FF00;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    height: 80vh;
}
#consoleLog {
    flex: 1;
    overflow-y: auto;
    white-space: pre-wrap;
}
#commandLine {
    display: flex;
    margin-top: 5px;
}
#commandInput {
    flex: 1;
    background-color: #000;
    color: #00FF00;
    border: 1px solid #00FF00;
    font-family: monospace;
    font-size: 16px;
    padding: 5px;
    outline: none;
}
#commandInput::placeholder {
    color: #00FF00aa;
}
button {
    display: none; /* hidden, optional if we want enter only */
}
</style>
</head>
<body>

<div id="terminalContainer">
    <div id="consoleLog">LILAC INSTITUTE TERMINAL ONLINE\nType 'help' for commands.\n</div>
    <div id="commandLine">
        <span>&gt; </span>
        <input type="text" id="commandInput" placeholder="Enter command..." autofocus>
    </div>
</div>

<script>
// Modular commands system
const commands = {
    help: () => {
        return "Available commands:\nhelp - show this message\nclear - clear console\nsecret - reveal hidden message";
    },
    clear: () => {
        document.getElementById('consoleLog').textContent = "LILAC INSTITUTE TERMINAL ONLINE\nType 'help' for commands.\n";
        return '';
    },
    secret: () => {
        return ">>> SECRET MODULE UNLOCKED: CLUES ARCHIVE ONLINE <<<";
    },
    info: () => {
        return "Lilac Institute Alpha Terminal v1.0\nExploring the Anomalous...";
    }
};

// Handle command input
document.getElementById('commandInput').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
        const input = this.value.trim();
        const consoleLog = document.getElementById('consoleLog');
        consoleLog.textContent += '\n> ' + input;
        
        if(commands[input.toLowerCase()]){
            const output = commands[input.toLowerCase()]();
            if(output) consoleLog.textContent += '\n' + output;
        } else if(input !== ''){
            consoleLog.textContent += '\n> Unknown command';
        }
        consoleLog.scrollTop = consoleLog.scrollHeight;
        this.value = '';
    }
});

// Optional: function to add new commands on the fly
function addCommand(name, func){
    commands[name.toLowerCase()] = func;
}

// Example dynamic addition
addCommand('time', () => 'Current time: ' + new Date().toLocaleTimeString());

</script>
</body>
</html>
